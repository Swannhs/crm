apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mymanager-api
spec:
  ingressClassName: nginx
  rules:
    - host: api.staging.mymanager.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-gateway
                port:
                  number: 8081
