apiVersion: v1
kind: Service
metadata:
  name: keycloak-db
  labels:
    app.kubernetes.io/name: keycloak-db
spec:
  selector:
    app.kubernetes.io/name: keycloak-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak-db
  labels:
    app.kubernetes.io/name: keycloak-db
spec:
  serviceName: keycloak-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-db
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: keycloak-db-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U keycloak"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 8Gi
