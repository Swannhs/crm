apiVersion: v1
kind: Service
metadata:
  name: billing-db
  labels:
    app.kubernetes.io/name: billing-db
spec:
  selector:
    app.kubernetes.io/name: billing-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: billing-db
  labels:
    app.kubernetes.io/name: billing-db
spec:
  serviceName: billing-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: billing-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: billing-db
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: billing-db-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 8Gi
