services:
  monolith:
    image: node:16-alpine
    working_dir: /app
    volumes:
      - ../../../server:/app
    command: sh -c "yarn install && node index.js"

  crm-service:
    build:
      context: ../../services/crm-service
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ../../services/crm-service:/app

  organization-service:
    build:
      context: ../..
      dockerfile: infra/docker/node-service/Dockerfile.dev
      args:
        SERVICE_NAME: organization-service
        SERVICE_PORT: 7010
    volumes:
      - ../../:/workspace
      - workspace_node_modules:/workspace/node_modules

  billing-service:
    build:
      context: ../..
      dockerfile: infra/docker/node-service/Dockerfile.dev
      args:
        SERVICE_NAME: billing-service
