services:
  organization-service:
    build:
      context: ../..
      dockerfile: services/organization-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: organization-service
        SERVICE_PORT: 7010
    volumes:
      - ../../:/workspace
      - ../../node_modules:/workspace/node_modules

  api-router-service:
    build:
      context: ../..
      dockerfile: services/api-router-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: api-router-service
        SERVICE_PORT: 7001
    volumes:
      - ../../:/workspace
      - ../../node_modules:/workspace/node_modules

  realtime-service:
    build:
      context: ../..
      dockerfile: services/realtime-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: realtime-service
        SERVICE_PORT: 7030
    volumes:
      - ../../:/workspace
      - ../../node_modules:/workspace/node_modules

  integrations-service:
    build:
      context: ../..
      dockerfile: services/integrations-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: integrations-service
        SERVICE_PORT: 7140
    volumes:
      - ../../:/workspace
      - ../../node_modules:/workspace/node_modules

  magento-integration-service:
    build:
      context: ../..
      dockerfile: services/magento-integration-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: magento-integration-service
        SERVICE_PORT: 7190
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ../../:/workspace
      - ../../node_modules:/workspace/node_modules

  odoo-integration-service:
    build:
      context: ../..
      dockerfile: services/odoo-integration-service/docker/Dockerfile.dev
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ../../:/workspace
      - ../../node_modules:/workspace/node_modules

  email-sync-service:
    build:
      context: ../..
      dockerfile: services/email-sync-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: email-sync-service
        SERVICE_PORT: 7160
    volumes:
      - ../../:/workspace
      - ../../node_modules:/workspace/node_modules

  frontend:
    build:
      context: ../../frontend/micro-app
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ../../frontend/micro-app:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_SERVER_URL: http://localhost:8081
      NEXT_PUBLIC_API_URL: http://localhost:8081/api
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
      NEXT_PUBLIC_KEYCLOAK_REALM: mymanager
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: mymanager-web
      PORT: 3034
      WATCHPACK_POLLING: "true"

volumes:
  crm_vendor:
  frontend_node_modules:
