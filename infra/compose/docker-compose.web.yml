# Web edge and UI services.
services:
  nginx:
    image: nginx:alpine
    container_name: ms-nginx
    volumes:
      - ../../gateway/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../gateway/nginx/cors.conf:/etc/nginx/cors.conf:ro
    ports:
      - "8081:8081"
    depends_on:
      - organization-service
      - crm-service
      - billing-service
      - projects-service
      - calendar-service
      - documents-service
      - employees-service
      - payments-service
      - pos-service
      - automation-service
      - notification-service
      - marketing-service
      - integrations-service
      - magento-integration-service
      - realtime-service
      - deal-service
      - email-sync-service
      - scoring-service
      - commerce-service
      - api-router-service

  frontend:
    container_name: ms-frontend
    ports:
      - "3034:3034"
    depends_on:
      - nginx
