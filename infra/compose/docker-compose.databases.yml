# Datastores used by the microservices stack.
services:
  keycloak-db:
    image: mysql:8.4
    container_name: ms-keycloak-db
    environment:
      MYSQL_DATABASE: keycloak
      MYSQL_USER: keycloak
      MYSQL_PASSWORD: keycloak
      MYSQL_ROOT_PASSWORD: keycloak-root
    ports:
      - "3307:3306"
    volumes:
      - ../data/mysql/keycloak-db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ukeycloak -pkeycloak --silent"]
      interval: 5s
      timeout: 5s
      retries: 5

  community-db:
    image: postgres:17-alpine
    container_name: ms-community-db
    environment:
      POSTGRES_DB: community
      POSTGRES_USER: community
      POSTGRES_PASSWORD: community
    ports:
      - "5437:5432"
    volumes:
      - ../data/postgres/community-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U community -d community"]
      interval: 5s
      timeout: 5s
      retries: 5

