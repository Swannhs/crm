services:
  keycloak:
    command: ["start", "--http-enabled=true", "--hostname-strict=false", "--proxy-headers=xforwarded"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-change-me}
    restart: unless-stopped

  rabbitmq:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  mongo:
    restart: unless-stopped

  monolith:
    environment:
      NODE_ENV: production
      PORT: ${MONOLITH_PORT:-5000}
    command: sh -c "yarn install --frozen-lockfile || yarn install && node index.js"
    restart: unless-stopped

  crm-service:
    restart: unless-stopped

  organization-service:
    environment:
      NODE_ENV: production
      PORT: ${ORGANIZATION_SERVICE_PORT:-7010}
    command: sh -c "corepack yarn install --frozen-lockfile && corepack yarn exec prisma generate && corepack yarn exec prisma db push --skip-generate && corepack yarn build && corepack yarn start"
    restart: unless-stopped

  billing-service:
