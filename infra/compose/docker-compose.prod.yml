services:
  keycloak:
    command: ["start", "--http-enabled=true", "--hostname-strict=false", "--proxy-headers=xforwarded"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-change-me}
    restart: unless-stopped

  redis:
    restart: unless-stopped

  mongo:
    restart: unless-stopped

  monolith:
    image: node:16-alpine
    working_dir: /app
    volumes:
      - ../../../server:/app
    environment:
      NODE_ENV: production
      PORT: ${MONOLITH_PORT:-5000}
    command: sh -c "yarn install --frozen-lockfile || yarn install && node index.js"
    restart: unless-stopped

  organization-service:
    build:
      context: ../..
      dockerfile: services/organization-service/docker/Dockerfile.prod
      args:
        SERVICE_NAME: organization-service
        SERVICE_PORT: 7010
    environment:
      NODE_ENV: production
      PORT: ${ORGANIZATION_SERVICE_PORT:-7010}
    restart: unless-stopped

  booking-service:
