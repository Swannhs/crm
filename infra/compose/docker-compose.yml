    image: mongo:6.0
    container_name: ms-monolith-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  monolith:
    container_name: ms-monolith
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/mymanager
      APPNAME: api
      GCLOUD_PROJECT: local-dev
      GCS_BUCKET: local-dev-bucket
      GCS_FOLDER: uploads
      GCS_TYPE: service_account
      GCS_PROJECT_ID: local-dev
      GCS_PRIVATE_KEY_ID: local-dev-key
      GCS_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\\nlocal-dev\\n-----END PRIVATE KEY-----\\n"
      GCS_CLIENT_EMAIL: local-dev@example.com
      GCS_CLIENT_ID: local-dev-client
      GCS_AUTH_URI: https://accounts.google.com/o/oauth2/auth
      GCS_TOKEN_URI: https://oauth2.googleapis.com/token
      GCS_AUTH_PROVIDER_X509_CERT_URL: https://www.googleapis.com/oauth2/v1/certs
      GCS_CLIENT_X509_CERT_URL: https://www.googleapis.com/robot/v1/metadata/x509/local-dev%40example.com
      TWILIO_ACCOUNT_SID: AC00000000000000000000000000000000
      TWILIO_AUTH_TOKEN: local-dev-token
      STRIPE_SECRET_KEY: sk_test_local_dev
      TOKEN_SECRET_KEY: local-dev-token-secret
      S3_ACCESSKEY: local-dev-access
      S3_SECRET: local-dev-secret
      S3_BUCKET: local-dev-bucket
      SENDGRID_API_KEY: SG.local-dev
    depends_on:
      - mongo
    ports:
      - "5000:5000"

  crm-service:
    container_name: ms-crm-service
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:zQ2EhlbMUt1iZc8g1/Rr4qOfjROp+oJjwt6vszci3gM=
      APP_URL: http://localhost:8010
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: crm-db
      DB_PORT: 5432
      DB_DATABASE: crm
      DB_USERNAME: crm
      DB_PASSWORD: crm
    ports:
      - "8010:8010"
    depends_on:
      - crm-db
    volumes:
      - ../../services/crm-service:/app

  organization-service:
    container_name: ms-organization-service
