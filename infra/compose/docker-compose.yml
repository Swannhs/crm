services:
  keycloak-db:
    image: postgres:17-alpine
    container_name: ms-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5433:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: ms-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"
    volumes:
      - ../../auth/keycloak/realm:/opt/keycloak/data/import:ro
    depends_on:
      - keycloak-db

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ms-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    container_name: ms-redis
    ports:
      - "6379:6379"

  community-db:
    image: postgres:17-alpine
    container_name: ms-community-db
    environment:
      POSTGRES_DB: community
      POSTGRES_USER: community
      POSTGRES_PASSWORD: community
    ports:
      - "5437:5432"
    volumes:
      - community_db_data:/var/lib/postgresql/data

  commerce-db:
    image: postgres:17-alpine
    container_name: ms-commerce-db
    environment:
      POSTGRES_DB: commerce
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commerce
    ports:
      - "5438:5432"
    volumes:
      - commerce_db_data:/var/lib/postgresql/data

  crm-db:
    image: postgres:17-alpine
    container_name: ms-crm-db
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "5434:5432"
    volumes:
      - crm_db_data:/var/lib/postgresql/data

  organization-db:
    image: postgres:17-alpine
    container_name: ms-organization-db
    environment:
      POSTGRES_DB: organization
      POSTGRES_USER: organization
      POSTGRES_PASSWORD: organization
    ports:
      - "5435:5432"
    volumes:
      - organization_db_data:/var/lib/postgresql/data

  billing-db:
    image: postgres:17-alpine
    container_name: ms-billing-db
    environment:
      POSTGRES_DB: billing
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing
    ports:
      - "5436:5432"
    volumes:
      - billing_db_data:/var/lib/postgresql/data

  booking-db:
    image: postgres:17-alpine
    container_name: ms-booking-db
    environment:
      POSTGRES_DB: booking
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
    ports:
      - "5439:5432"
    volumes:
      - booking_db_data:/var/lib/postgresql/data

  documents-db:
    image: postgres:17-alpine
    container_name: ms-documents-db
    environment:
      POSTGRES_DB: documents
      POSTGRES_USER: documents
      POSTGRES_PASSWORD: documents
    ports:
      - "5440:5432"
    volumes:
      - documents_db_data:/var/lib/postgresql/data

  payments-db:
    image: postgres:17-alpine
    container_name: ms-payments-db
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: payments
      POSTGRES_PASSWORD: payments
    ports:
      - "5441:5432"
    volumes:
      - payments_db_data:/var/lib/postgresql/data

  notification-db:
    image: postgres:17-alpine
    container_name: ms-notification-db
    environment:
      POSTGRES_DB: notification
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
    ports:
      - "5442:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data

  crm-service:
    build:
      context: ../../services/crm-service
    container_name: ms-crm-service
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:zQ2EhlbMUt1iZc8g1/Rr4qOfjROp+oJjwt6vszci3gM=
      APP_URL: http://localhost:8010
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: crm-db
      DB_PORT: 5432
      DB_DATABASE: crm
      DB_USERNAME: crm
      DB_PASSWORD: crm
    ports:
      - "8010:8010"
    depends_on:
      - crm-db

  organization-service:
    build:
      context: ../..
      dockerfile: docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/organization-service
    container_name: ms-organization-service
    environment:
      PORT: 7010
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://organization:organization@organization-db:5432/organization
    ports:
      - "7010:7010"
    depends_on:
      - rabbitmq
      - organization-db

  billing-service:
    build:
      context: ../..
      dockerfile: docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/billing-service
    container_name: ms-billing-service
    environment:
      PORT: 7020
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://billing:billing@billing-db:5432/billing
    ports:
      - "7020:7020"
    depends_on:
      - rabbitmq
      - billing-db

  booking-service:
    build:
      context: ../..
      dockerfile: docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/booking-service
    container_name: ms-booking-service
    environment:
      PORT: 7040
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://booking:booking@booking-db:5432/booking
    ports:
      - "7040:7040"
    depends_on:
      - rabbitmq
      - booking-db

  api-router-service:
    build:
      context: ../..
      dockerfile: docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/api-router-service
    container_name: ms-api-router-service
    environment:
      PORT: 7001
    ports:
      - "7001:7001"

  community-service:
    build:
      context: ../..
      dockerfile: docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/community-service
    container_name: ms-community-service
    environment:
      PORT: 7050
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://community:community@community-db:5432/community
    ports:
      - "7050:7050"
    depends_on:
      - rabbitmq
      - community-db

  commerce-service:
    build:
      context: ../..
      dockerfile: docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/commerce-service
    container_name: ms-commerce-service
    environment:
      PORT: 7060
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://commerce:commerce@commerce-db:5432/commerce
    ports:
      - "7060:7060"
    depends_on:
      - rabbitmq
      - commerce-db

  documents-service:
    build:
      context: ../..
      dockerfile: docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/documents-service
    container_name: ms-documents-service
    environment:
      PORT: 7070
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://documents:documents@documents-db:5432/documents
    ports:
      - "7070:7070"
    depends_on:
      - rabbitmq
      - documents-db

  payments-service:
    build:
      context: ../..
      dockerfile: docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/payments-service
    container_name: ms-payments-service
    environment:
      PORT: 7080
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://payments:payments@payments-db:5432/payments
    ports:
      - "7080:7080"
    depends_on:
      - rabbitmq
      - payments-db

  notification-service:
    build:
      context: ../..
      dockerfile: docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/notification-service
    container_name: ms-notification-service
    restart: unless-stopped
    environment:
      PORT: 7050
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://notification:notification@notification-db:5432/notification
    ports:
      - "7055:7050"
    depends_on:
      - rabbitmq
      - notification-db

  realtime-service:
    build:
      context: ../..
      dockerfile: docker/node-service.Dockerfile
      args:
        SERVICE_PATH: services/realtime-service
    container_name: ms-realtime-service
    environment:
      PORT: 7030
      RABBITMQ_URL: amqp://rabbitmq:5672
      REDIS_URL: redis://redis:6379
    ports:
      - "7030:7030"
    depends_on:
      - rabbitmq
      - redis

  krakend:
    image: krakend:2.13.4
    container_name: ms-krakend
    command: ["run", "-c", "/etc/krakend/krakend.json"]
    ports:
      - "8081:8081"
    volumes:
      - ../../gateway/krakend/krakend.json:/etc/krakend/krakend.json:ro
    depends_on:
      - keycloak
      - organization-service
      - crm-service
      - billing-service
      - booking-service

volumes:
  keycloak_db_data:
  crm_db_data:
  organization_db_data:
  billing_db_data:
  booking_db_data:
  community_db_data:
  commerce_db_data:
  documents_db_data:
  payments_db_data:
  notification_db_data:
