services:
  keycloak-db:
    image: postgres:17-alpine
    container_name: ms-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5433:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: ms-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"
    volumes:
      - ../../auth/keycloak/realm:/opt/keycloak/data/import:ro
    depends_on:
      - keycloak-db

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ms-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    container_name: ms-redis
    ports:
      - "6379:6379"

  community-db:
    image: postgres:17-alpine
    container_name: ms-community-db
    environment:
      POSTGRES_DB: community
      POSTGRES_USER: community
      POSTGRES_PASSWORD: community
    ports:
      - "5437:5432"
    volumes:
      - community_db_data:/var/lib/postgresql/data

  commerce-db:
    image: postgres:17-alpine
    container_name: ms-commerce-db
    environment:
      POSTGRES_DB: commerce
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commerce
    ports:
      - "5438:5432"
    volumes:
      - commerce_db_data:/var/lib/postgresql/data

  crm-db:
    image: postgres:17-alpine
    container_name: ms-crm-db
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "5434:5432"
    volumes:
      - crm_db_data:/var/lib/postgresql/data

  organization-db:
    image: postgres:17-alpine
    container_name: ms-organization-db
    environment:
      POSTGRES_DB: organization
      POSTGRES_USER: organization
      POSTGRES_PASSWORD: organization
    ports:
      - "5435:5432"
    volumes:
      - organization_db_data:/var/lib/postgresql/data

  billing-db:
    image: postgres:17-alpine
    container_name: ms-billing-db
    environment:
      POSTGRES_DB: billing
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing
    ports:
      - "5436:5432"
    volumes:
      - billing_db_data:/var/lib/postgresql/data

  booking-db:
    image: postgres:17-alpine
    container_name: ms-booking-db
    environment:
      POSTGRES_DB: booking
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
    ports:
      - "5439:5432"
    volumes:
      - booking_db_data:/var/lib/postgresql/data

  documents-db:
    image: postgres:17-alpine
    container_name: ms-documents-db
    environment:
      POSTGRES_DB: documents
      POSTGRES_USER: documents
      POSTGRES_PASSWORD: documents
    ports:
      - "5440:5432"
    volumes:
      - documents_db_data:/var/lib/postgresql/data

  payments-db:
    image: postgres:17-alpine
    container_name: ms-payments-db
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: payments
      POSTGRES_PASSWORD: payments
    ports:
      - "5441:5432"
    volumes:
      - payments_db_data:/var/lib/postgresql/data

  notification-db:
    image: postgres:17-alpine
    container_name: ms-notification-db
    environment:
      POSTGRES_DB: notification
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
    ports:
      - "5442:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data

  employees-db:
    image: postgres:17-alpine
    container_name: ms-employees-db
    environment:
      POSTGRES_DB: employees
      POSTGRES_USER: employees
      POSTGRES_PASSWORD: employees
    ports:
      - "5443:5432"
    volumes:
      - employees_db_data:/var/lib/postgresql/data

  marketing-db:
    image: postgres:17-alpine
    container_name: ms-marketing-db
    environment:
      POSTGRES_DB: marketing
      POSTGRES_USER: marketing
      POSTGRES_PASSWORD: marketing
    ports:
      - "5444:5432"
    volumes:
      - marketing_db_data:/var/lib/postgresql/data

  projects-db:
    image: postgres:17-alpine
    container_name: ms-projects-db
    environment:
      POSTGRES_DB: projects
      POSTGRES_USER: projects
      POSTGRES_PASSWORD: projects
    ports:
      - "5445:5432"
    volumes:
      - projects_db_data:/var/lib/postgresql/data

  calendar-db:
    image: postgres:17-alpine
    container_name: ms-calendar-db
    environment:
      POSTGRES_DB: calendar
      POSTGRES_USER: calendar
      POSTGRES_PASSWORD: calendar
    ports:
      - "5446:5432"
    volumes:
      - calendar_db_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6.0
    container_name: ms-monolith-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  monolith:
    image: node:16-alpine
    container_name: ms-monolith
    working_dir: /app
    volumes:
      - ../../../server:/app
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/mymanager
      APPNAME: api
    command: sh -c "yarn install && node index.js"
    depends_on:
      - mongo
    ports:
      - "5000:5000"

  crm-service:
    build:
      context: ../../services/crm-service
    container_name: ms-crm-service
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:zQ2EhlbMUt1iZc8g1/Rr4qOfjROp+oJjwt6vszci3gM=
      APP_URL: http://localhost:8010
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: crm-db
      DB_PORT: 5432
      DB_DATABASE: crm
      DB_USERNAME: crm
      DB_PASSWORD: crm
    ports:
      - "8010:8010"
    depends_on:
      - crm-db

  organization-service:
    image: node:24-alpine
    container_name: ms-organization-service
    working_dir: /repo/services/organization-service
    volumes:
      - ../../:/repo
    environment:
      PORT: 7010
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://organization:organization@organization-db:5432/organization
    command: sh -c "npx --no-install prisma generate && npx --no-install tsx watch src/index.ts"
    depends_on:
      - rabbitmq
      - organization-db
    ports:
      - "7010:7010"

  billing-service:
    image: node:24-alpine
    container_name: ms-billing-service
    working_dir: /repo/services/billing-service
    volumes:
      - ../../:/repo
    environment:
      PORT: 7020
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://billing:billing@billing-db:5432/billing
    command: sh -c "npx --no-install prisma generate && npx --no-install tsx watch src/index.ts"
    depends_on:
      - rabbitmq
      - billing-db
    ports:
      - "7020:7020"

  booking-service:
    image: node:24-alpine
    container_name: ms-booking-service
    working_dir: /repo/services/booking-service
    volumes:
      - ../../:/repo
    environment:
      PORT: 7040
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://booking:booking@booking-db:5432/booking
    command: sh -c "npx --no-install prisma generate && npx --no-install tsx watch src/index.ts"
    depends_on:
      - rabbitmq
      - booking-db
    ports:
      - "7040:7040"

  api-router-service:
    image: node:24-alpine
    container_name: ms-api-router-service
    working_dir: /repo/services/api-router-service
    volumes:
      - ../../:/repo
    environment:
      PORT: 7001
    command: npx --no-install tsx watch src/index.ts
    ports:
      - "7001:7001"

  community-service:
    image: node:24-alpine
    container_name: ms-community-service
    working_dir: /repo/services/community-service
    volumes:
      - ../../:/repo
    environment:
      PORT: 7050
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://community:community@community-db:5432/community
    command: sh -c "npx --no-install prisma generate && npx --no-install tsx watch src/index.ts"
    depends_on:
      - rabbitmq
      - community-db
    ports:
      - "7050:7050"

  commerce-service:
    image: node:24-alpine
    container_name: ms-commerce-service
    working_dir: /repo/services/commerce-service
    volumes:
      - ../../:/repo
    environment:
      PORT: 7060
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://commerce:commerce@commerce-db:5432/commerce
    command: sh -c "npx --no-install prisma generate && npx --no-install tsx watch src/index.ts"
    depends_on:
      - rabbitmq
      - commerce-db
    ports:
      - "7060:7060"

  documents-service:
    image: node:24-alpine
    container_name: ms-documents-service
    working_dir: /repo/services/documents-service
    volumes:
      - ../../:/repo
    environment:
      PORT: 7080
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://documents:documents@documents-db:5432/documents
    command: sh -c "npx --no-install prisma generate && npx --no-install tsx watch src/index.ts"
    depends_on:
      - rabbitmq
      - documents-db
    ports:
      - "7080:7080"

  payments-service:
    image: node:24-alpine
    container_name: ms-payments-service
    working_dir: /repo/services/payments-service
    volumes:
      - ../../:/repo
    environment:
      PORT: 7090
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://payments:payments@payments-db:5432/payments
    command: sh -c "npx --no-install prisma generate && npx --no-install tsx watch src/index.ts"
    depends_on:
      - rabbitmq
      - payments-db
    ports:
      - "7090:7090"

  notification-service:
    image: node:24-alpine
    container_name: ms-notification-service
    restart: unless-stopped
    working_dir: /repo/services/notification-service
    volumes:
      - ../../:/repo
    environment:
      PORT: 8000
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://notification:notification@notification-db:5432/notification
    command: sh -c "npx --no-install prisma generate && npx --no-install tsx watch src/index.ts"
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
      - notification-db

  employees-service:
    image: node:24-alpine
    container_name: ms-employees-service
    working_dir: /repo/services/employees-service
    volumes:
      - ../../:/repo
    environment:
      PORT: 7070
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://employees:employees@employees-db:5432/employees
    command: sh -c "npx --no-install prisma generate && npx --no-install tsx watch src/index.ts"
    depends_on:
      - rabbitmq
      - employees-db
    ports:
      - "7070:7070"

  realtime-service:
    image: node:24-alpine
    container_name: ms-realtime-service
    working_dir: /repo/services/realtime-service
    volumes:
      - ../../:/repo
    environment:
      PORT: 7030
      RABBITMQ_URL: amqp://rabbitmq:5672
      REDIS_URL: redis://redis:6379
    command: npx --no-install tsx watch src/index.ts
    depends_on:
      - rabbitmq
      - redis
    ports:
      - "7030:7030"

  marketing-service:
    image: node:24-alpine
    container_name: ms-marketing-service
    working_dir: /repo/services/marketing-service
    volumes:
      - ../../:/repo
    environment:
      PORT: 8030
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://marketing:marketing@marketing-db:5432/marketing
    command: sh -c "npx --no-install prisma generate && npx --no-install tsx watch src/index.ts"
    depends_on:
      - rabbitmq
      - marketing-db
    ports:
      - "8030:8030"

  projects-service:
    image: node:24-alpine
    container_name: ms-projects-service
    working_dir: /repo/services/projects-service
    volumes:
      - ../../:/repo
    environment:
      PORT: 8040
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://projects:projects@projects-db:5432/projects
    command: sh -c "npx --no-install prisma generate && npx --no-install tsx watch src/index.ts"
    depends_on:
      - rabbitmq
      - projects-db
    ports:
      - "8040:8040"

  calendar-service:
    image: node:24-alpine
    container_name: ms-calendar-service
    working_dir: /repo/services/calendar-service
    volumes:
      - ../../:/repo
    environment:
      PORT: 8050
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://calendar:calendar@calendar-db:5432/calendar
    command: sh -c "npx --no-install prisma generate && npx --no-install tsx watch src/index.ts"
    depends_on:
      - rabbitmq
      - calendar-db
    ports:
      - "8050:8050"

  pos-db:
    image: postgres:17-alpine
    container_name: ms-pos-db
    environment:
      POSTGRES_DB: pos
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: pos
    ports:
      - "5447:5432"
    volumes:
      - pos_db_data:/var/lib/postgresql/data

  pos-service:
    image: node:24-alpine
    container_name: ms-pos-service
    working_dir: /repo/services/pos-service
    volumes:
      - ../../:/repo
    environment:
      PORT: 7100
      RABBITMQ_URL: amqp://rabbitmq:5672
      DB_URL: postgres://pos:pos@pos-db:5432/pos
    command: sh -c "npx --no-install prisma generate && npx --no-install tsx watch src/index.ts"
    depends_on:
      - rabbitmq
      - pos-db
    ports:
      - "7100:7100"

  krakend:
    image: krakend:2.13.4
    container_name: ms-krakend
    command: ["run", "-c", "/etc/krakend/krakend.json"]
    ports:
      - "8081:8081"
    volumes:
      - ../../gateway/krakend/krakend.json:/etc/krakend/krakend.json:ro
    depends_on:
      - keycloak
      - organization-service
      - crm-service
      - billing-service
      - booking-service
      - pos-service

  frontend:
    image: node:24-alpine
    container_name: ms-frontend
    working_dir: /repo/frontend/micro-app
    volumes:
      - ../../:/repo
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8081/api
      - PORT=3034
      - WATCHPACK_POLLING=true
    command: npx --no-install next dev -p 3034
    ports:
      - "3034:3034"
    depends_on:
      - krakend

volumes:
  keycloak_db_data:
  crm_db_data:
  organization_db_data:
  billing_db_data:
  booking_db_data:
  community_db_data:
  commerce_db_data:
  employees_db_data:
  marketing_db_data:
  projects_db_data:
  documents_db_data:
  payments_db_data:
  notification_db_data:
  calendar_db_data:
  pos_db_data:
  mongo_data:
