services:
  keycloak-db:
    image: mysql:8.0
    container_name: keycloak-db
    environment:
      MYSQL_DATABASE: keycloak
      MYSQL_USER: keycloak
      MYSQL_PASSWORD: keycloak
      MYSQL_ROOT_PASSWORD: keycloak-root
    ports:
      - "3307:3306"
    volumes:
      - ../../data/mysql/keycloak-db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ukeycloak -pkeycloak --silent"]
      interval: 5s
      timeout: 5s
      retries: 5

  organization-db:
    image: postgres:17-alpine
    container_name: organization-db
    environment:
      POSTGRES_DB: organization
      POSTGRES_USER: organization
      POSTGRES_PASSWORD: organization
    ports:
      - "5435:5432"
    volumes:
      - ../../data/postgres/organization-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U organization -d organization"]
      interval: 5s
      timeout: 5s
      retries: 5

  realtime-db:
    image: postgres:17-alpine
    container_name: realtime-db
    environment:
      POSTGRES_DB: realtime
      POSTGRES_USER: realtime
      POSTGRES_PASSWORD: realtime
    ports:
      - "5452:5432"
    volumes:
      - ../../data/postgres/realtime-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realtime -d realtime"]
      interval: 5s
      timeout: 5s
      retries: 5

  integrations-db:
    image: postgres:17-alpine
    container_name: integrations-db
    environment:
      POSTGRES_DB: integrations
      POSTGRES_USER: integrations
      POSTGRES_PASSWORD: integrations
    ports:
      - "5451:5432"
    volumes:
      - ../../data/postgres/integrations-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U integrations -d integrations"]
      interval: 5s
      timeout: 5s
      retries: 5

  email-sync-db:
    image: postgres:17-alpine
    container_name: email-sync-db
    environment:
      POSTGRES_DB: email_sync_service
      POSTGRES_USER: emailsync
      POSTGRES_PASSWORD: emailsync
    ports:
      - "5455:5432"
    volumes:
      - ../../data/postgres/email-sync-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailsync -d email_sync_service"]
      interval: 5s
      timeout: 5s
      retries: 5

  odoo-integration-db:
    image: postgres:17-alpine
    container_name: odoo-integration-db
    environment:
      POSTGRES_DB: odoo_integration
      POSTGRES_USER: odoo_integration
      POSTGRES_PASSWORD: odoo_integration
    ports:
      - "5457:5432"
    volumes:
      - ../../data/postgres/odoo-integration-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo_integration -d odoo_integration"]
      interval: 5s
      timeout: 5s
      retries: 5

  magento-integration-db:
    image: postgres:17-alpine
    container_name: magento-integration-db
    profiles: ["magento"]
    environment:
      POSTGRES_DB: magento_integration
      POSTGRES_USER: magento_integration
      POSTGRES_PASSWORD: magento_integration
    ports:
      - "5458:5432"
    volumes:
      - ../../data/postgres/magento-integration-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magento_integration -d magento_integration"]
      interval: 5s
      timeout: 5s
      retries: 5

  booking-db:
    image: postgres:17-alpine
    container_name: booking-db
    environment:
      POSTGRES_DB: booking
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
    ports:
      - "5459:5432"
    volumes:
      - ../../data/postgres/booking-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking -d booking"]
      interval: 5s
      timeout: 5s
      retries: 5

  odoo-db:
    image: postgres:16-alpine
    container_name: odoo-db
    environment:
      POSTGRES_DB: ${ODOO_DB:-odoo}
      POSTGRES_USER: ${ODOO_DB_USER:-odoo}
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
    ports:
      - "${ODOO_DB_PORT:-5436}:5432"
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 20

  magento-db:
    image: mysql:8.4
    container_name: magento-db
    profiles: ["magento"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MAGENTO_DB_ROOT_PASSWORD:-magento_root}
      MYSQL_DATABASE: ${MAGENTO_DB_NAME:-magento}
      MYSQL_USER: ${MAGENTO_DB_USER:-magento}
      MYSQL_PASSWORD: ${MAGENTO_DB_PASSWORD:-magento}
    ports:
      - "${MAGENTO_DB_PORT:-33306}:3306"
    volumes:
      - magento_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  odoo_db_data:
  magento_db_data:
