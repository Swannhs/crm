services:
  organization-service:
    build:
      context: ../../..
      dockerfile: services/organization-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: organization-service
        SERVICE_PORT: 7010
    container_name: ms-organization-service
    volumes:
      - ../../../node_modules:/workspace/node_modules
      - ../../../services/organization-service:/workspace/services/organization-service
      - ../../../common:/workspace/common
      - ../../../package.json:/workspace/package.json
      - ../../../yarn.lock:/workspace/yarn.lock
    environment:
      PORT: 7010
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://organization:organization@organization-db:5432/organization
      KEYCLOAK_ADMIN_URL: http://keycloak:8080
      KEYCLOAK_REALM: mymanager
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    depends_on:
      kafka:
        condition: service_started
      organization-db:
        condition: service_healthy
    ports:
      - "7010:7010"

  api-router-service:
    build:
      context: ../../..
      dockerfile: services/api-router-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: api-router-service
        SERVICE_PORT: 7001
    container_name: ms-api-router-service
    volumes:
      - ../../../node_modules:/workspace/node_modules
      - ../../../services/api-router-service:/workspace/services/api-router-service
      - ../../../common:/workspace/common
      - ../../../package.json:/workspace/package.json
      - ../../../yarn.lock:/workspace/yarn.lock
    environment:
      PORT: 7001
    ports:
      - "7001:7001"

  realtime-service:
    build:
      context: ../../..
      dockerfile: services/realtime-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: realtime-service
        SERVICE_PORT: 7030
    container_name: ms-realtime-service
    volumes:
      - ../../../node_modules:/workspace/node_modules
      - ../../../services/realtime-service:/workspace/services/realtime-service
      - ../../../common:/workspace/common
      - ../../../package.json:/workspace/package.json
      - ../../../yarn.lock:/workspace/yarn.lock
    environment:
      PORT: 7030
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://realtime:realtime@realtime-db:5432/realtime
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
      realtime-db:
        condition: service_healthy
    ports:
      - "7030:7030"

  integrations-service:
    build:
      context: ../../..
      dockerfile: services/integrations-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: integrations-service
        SERVICE_PORT: 7140
    container_name: ms-integrations-service
    volumes:
      - ../../../node_modules:/workspace/node_modules
      - ../../../services/integrations-service:/workspace/services/integrations-service
      - ../../../common:/workspace/common
      - ../../../package.json:/workspace/package.json
      - ../../../yarn.lock:/workspace/yarn.lock
    environment:
      PORT: 7140
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://integrations:integrations@integrations-db:5432/integrations
      MAGENTO_INTEGRATION_SERVICE_URL: http://magento-integration-service:7190
      ODOO_INTEGRATION_SERVICE_URL: http://odoo-integration-service:7200
    depends_on:
      kafka:
        condition: service_started
      integrations-db:
        condition: service_healthy
      magento-integration-service:
        condition: service_started
      odoo-integration-service:
        condition: service_started
    ports:
      - "7140:7140"

  magento-integration-service:
    build:
      context: ../../..
      dockerfile: services/magento-integration-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: magento-integration-service
        SERVICE_PORT: 7190
    container_name: ms-magento-integration-service
    volumes:
      - ../../../node_modules:/workspace/node_modules
      - ../../../services/magento-integration-service:/workspace/services/magento-integration-service
      - ../../../common:/workspace/common
      - ../../../package.json:/workspace/package.json
      - ../../../yarn.lock:/workspace/yarn.lock
    environment:
      PORT: 7190
      MAGENTO_BASE_URL: ${MAGENTO_BASE_URL:-http://magento}
      MAGENTO_ACCESS_TOKEN: ${MAGENTO_ACCESS_TOKEN:-}
      MAGENTO_STORE_CODE: ${MAGENTO_STORE_CODE:-default}
      MAGENTO_ADMIN_USERNAME: ${MAGENTO_ADMIN_USERNAME:-admin}
      MAGENTO_ADMIN_PASSWORD: ${MAGENTO_ADMIN_PASSWORD:-admin123}
      DATABASE_URL: postgres://magento_integration:magento_integration@magento-integration-db:5432/magento_integration
    depends_on:
      magento-integration-db:
        condition: service_healthy
      magento:
        condition: service_started
    ports:
      - "7190:7190"

  odoo-integration-service:
    build:
      context: ../../..
      dockerfile: services/odoo-integration-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: odoo-integration-service
        SERVICE_PORT: 7200
    container_name: ms-odoo-integration-service
    volumes:
      - ../../../node_modules:/workspace/node_modules
      - ../../../services/odoo-integration-service:/workspace/services/odoo-integration-service
      - ../../../common:/workspace/common
      - ../../../package.json:/workspace/package.json
      - ../../../yarn.lock:/workspace/yarn.lock
    environment:
      PORT: 7200
      ODOO_BASE_URL: ${ODOO_BASE_URL:-http://odoo:8069}
      ODOO_DB: ${ODOO_DB:-odoo}
      ODOO_USERNAME: ${ODOO_USERNAME:-admin}
      ODOO_PASSWORD: ${ODOO_PASSWORD:-admin}
      ODOO_API_KEY: ${ODOO_API_KEY:-}
      MAGENTO_API_BASE_URL: http://magento-integration-service:7190
      DATABASE_URL: postgres://odoo_integration:odoo_integration@odoo-integration-db:5432/odoo_integration
    depends_on:
      magento-integration-service:
        condition: service_started
      odoo-integration-db:
        condition: service_healthy
      odoo:
        condition: service_started
    ports:
      - "7200:7200"

  email-sync-service:
    build:
      context: ../../..
      dockerfile: services/email-sync-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: email-sync-service
        SERVICE_PORT: 7160
    container_name: ms-email-sync-service
    volumes:
      - ../../../node_modules:/workspace/node_modules
      - ../../../services/email-sync-service:/workspace/services/email-sync-service
      - ../../../common:/workspace/common
      - ../../../package.json:/workspace/package.json
      - ../../../yarn.lock:/workspace/yarn.lock
    environment:
      PORT: 7160
      DATABASE_URL: postgres://emailsync:emailsync@email-sync-db:5432/email_sync_service
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: mymanager
      KEYCLOAK_CLIENT_ID: crm-api
    depends_on:
      email-sync-db:
        condition: service_healthy
    ports:
      - "7160:7160"

  booking-service:
    build:
      context: ../../..
      dockerfile: services/booking-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: booking-service
        SERVICE_PORT: 7040
    container_name: ms-booking-service
    volumes:
      - ../../../node_modules:/workspace/node_modules
      - ../../../services/booking-service:/workspace/services/booking-service
      - ../../../common:/workspace/common
      - ../../../package.json:/workspace/package.json
      - ../../../yarn.lock:/workspace/yarn.lock
    environment:
      PORT: 7040
      DATABASE_URL: postgres://booking:booking@booking-db:5432/booking
      ODOO_SERVICE_URL: http://odoo-integration-service:7200
    depends_on:
      booking-db:
        condition: service_healthy
    ports:
      - "7040:7040"

