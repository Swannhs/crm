services:
  organization-service:
    build:
      context: ../../..
      dockerfile: services/organization-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: organization-service
        SERVICE_PORT: 7010
    container_name: organization-service
    volumes:
      - ../../../services/organization-service:/app/services/organization-service
      - /app/services/organization-service/node_modules
      - ../../../common:/app/common
    environment:
      PORT: 7010
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://organization:organization@organization-db:5432/organization
      KEYCLOAK_ADMIN_URL: http://keycloak:8080
      KEYCLOAK_REALM: mymanager
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f}
    depends_on:
      kafka:
        condition: service_started
      organization-db:
        condition: service_healthy
    ports:
      - "7010:7010"

  api-router-service:
    build:
      context: ../../..
      dockerfile: services/api-router-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: api-router-service
        SERVICE_PORT: 7001
    container_name: api-router-service
    volumes:
      - ../../../services/api-router-service:/app/services/api-router-service
      - /app/services/api-router-service/node_modules
      - ../../../common:/app/common
    environment:
      PORT: 7001
      KEYCLOAK_TOKEN_URL: http://keycloak:8080/realms/mymanager/protocol/openid-connect/token
      KEYCLOAK_CLIENT_ID: mymanager-web
      ODOO_INTEGRATION_BASE_URL: http://odoo-integration-service:7200
      BOOKING_SERVICE_BASE_URL: http://booking-service:7040
      SCORING_SERVICE_BASE_URL: http://scoring-service:7180
      COMMUNITY_SERVICE_BASE_URL: http://community-service:7030
      DOCUMENTS_SERVICE_BASE_URL: http://documents-service:7080
      PAYMENTS_SERVICE_BASE_URL: http://payments-service:7090
      EMPLOYEES_SERVICE_BASE_URL: http://employees-service:7070
      INTEGRATIONS_SERVICE_BASE_URL: http://integrations-service:7140
      FINANCE_SERVICE_BASE_URL: http://finance-service:7170
      MONOLITH_BASE_URL: http://monolith:5000
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f}
    ports:
      - "7001:7001"

  realtime-service:
    build:
      context: ../../..
      dockerfile: services/realtime-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: realtime-service
        SERVICE_PORT: 7030
    container_name: realtime-service
    volumes:
      - ../../../services/realtime-service:/app/services/realtime-service
      - /app/services/realtime-service/node_modules
      - ../../../common:/app/common
    environment:
      PORT: 7030
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://realtime:realtime@realtime-db:5432/realtime
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f}
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
      realtime-db:
        condition: service_healthy
    ports:
      - "7030:7030"

  integrations-service:
    build:
      context: ../../..
      dockerfile: services/integrations-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: integrations-service
        SERVICE_PORT: 7140
    container_name: integrations-service
    volumes:
      - ../../../services/integrations-service:/app/services/integrations-service
      - /app/services/integrations-service/node_modules
      - ../../../common:/app/common
    environment:
      PORT: 7140
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://integrations:integrations@integrations-db:5432/integrations
      ODOO_INTEGRATION_SERVICE_URL: http://odoo-integration-service:7200
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f}
    depends_on:
      kafka:
        condition: service_started
      integrations-db:
        condition: service_healthy
      odoo-integration-service:
        condition: service_started
    ports:
      - "7140:7140"

  odoo-integration-service:
    build:
      context: ../../..
      dockerfile: services/odoo-integration-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: odoo-integration-service
        SERVICE_PORT: 7200
    container_name: odoo-integration-service
    volumes:
      - ../../../services/odoo-integration-service:/app/services/odoo-integration-service
      - /app/services/odoo-integration-service/node_modules
      - ../../../common:/app/common
    environment:
      PORT: 7200
      ODOO_BASE_URL: ${ODOO_BASE_URL:-http://odoo:8069}
      ODOO_DB: ${ODOO_DB:-odoo}
      ODOO_USERNAME: ${ODOO_USERNAME:-admin}
      ODOO_PASSWORD: ${ODOO_PASSWORD:-admin}
      ODOO_API_KEY: ${ODOO_API_KEY:-}
      DATABASE_URL: postgres://odoo_integration:odoo_integration@odoo-integration-db:5432/odoo_integration
      MARKETING_WEBHOOK_PROVIDERS: ${MARKETING_WEBHOOK_PROVIDERS:-}
      MARKETING_WEBHOOK_SECRET: ${MARKETING_WEBHOOK_SECRET:-}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f}
    depends_on:
      odoo-integration-db:
        condition: service_healthy
      odoo:
        condition: service_started
    ports:
      - "7200:7200"

  email-sync-service:
    build:
      context: ../../..
      dockerfile: services/email-sync-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: email-sync-service
        SERVICE_PORT: 7160
    container_name: email-sync-service
    volumes:
      - ../../../services/email-sync-service:/app/services/email-sync-service
      - /app/services/email-sync-service/node_modules
      - ../../../common:/app/common
    environment:
      PORT: 7160
      DATABASE_URL: postgres://emailsync:emailsync@email-sync-db:5432/email_sync_service
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: mymanager
      KEYCLOAK_CLIENT_ID: crm-api
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-super-secret-key-32-chars-long!}
    depends_on:
      email-sync-db:
        condition: service_healthy
    ports:
      - "7160:7160"

  booking-service:
    build:
      context: ../../..
      dockerfile: services/booking-service/docker/Dockerfile.dev
      args:
        SERVICE_NAME: booking-service
        SERVICE_PORT: 7040
    container_name: booking-service
    volumes:
      - ../../../services/booking-service:/app/services/booking-service
      - /app/services/booking-service/node_modules
      - ../../../common:/app/common
    environment:
      PORT: 7040
      DATABASE_URL: postgres://booking:booking@booking-db:5432/booking
      ODOO_SERVICE_URL: http://odoo-integration-service:7200
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f}
    depends_on:
      booking-db:
        condition: service_healthy
    ports:
      - "7040:7040"
