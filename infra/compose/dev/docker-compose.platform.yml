services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: mysql
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_PORT: 3306
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"
    volumes:
      - ../../../auth/keycloak/realm:/opt/keycloak/data/import:ro
      - ../../../auth/keycloak/themes:/opt/keycloak/themes:ro
    depends_on:
      keycloak-db:
        condition: service_healthy

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  odoo:
    image: odoo:18.0
    container_name: odoo
    depends_on:
      odoo-db:
        condition: service_healthy
    environment:
      HOST: odoo-db
      PORT: 5432
      USER: ${ODOO_DB_USER:-odoo}
      PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
    ports:
      - "${ODOO_HTTP_PORT:-8069}:8069"
    volumes:
      - odoo_web_data:/var/lib/odoo

  magento-search:
    image: opensearchproject/opensearch:2.15.0
    container_name: magento-search
    profiles: ["magento"]
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: -Xms${MAGENTO_ES_HEAP_MIN:-512m} -Xmx${MAGENTO_ES_HEAP_MAX:-512m}
      DISABLE_SECURITY_PLUGIN: "true"
    ports:
      - "${MAGENTO_ES_PORT:-9201}:9200"
    volumes:
      - magento_search_data:/usr/share/opensearch/data

  magento:
    build:
      context: ../../..
      dockerfile: services/magento-service/docker/Dockerfile.dev
    container_name: magento
    profiles: ["magento"]
    ports:
      - "${MAGENTO_HTTP_PORT:-8088}:80"
      - "${MAGENTO_HTTPS_PORT:-8448}:443"
    environment:
      APP_UID: ${MAGENTO_APP_UID:-1000}
      APP_GID: ${MAGENTO_APP_GID:-1000}
      MAGENTO_HOST: ${MAGENTO_HOST:-localhost}
      MAGENTO_BASE_URL: ${MAGENTO_BASE_URL_PUBLIC:-http://localhost:8088}
      MAGENTO_DB_HOST: magento-db
      MAGENTO_DB_PORT: 3306
      MAGENTO_DB_DATABASE: ${MAGENTO_DB_NAME:-magento}
      MAGENTO_DB_USERNAME: ${MAGENTO_DB_USER:-magento}
      MAGENTO_DB_PASSWORD: ${MAGENTO_DB_PASSWORD:-magento}
      MYSQL_HOST: magento-db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MAGENTO_DB_NAME:-magento}
      MYSQL_USER: ${MAGENTO_DB_USER:-magento}
      MYSQL_PASSWORD: ${MAGENTO_DB_PASSWORD:-magento}
      OPENSEARCH_HOST: magento-search
      OPENSEARCH_PORT: 9200
      ELASTICSEARCH_HOST: magento-search
      ELASTICSEARCH_PORT: 9200
      MAGENTO_GIT_URL: ${MAGENTO_GIT_URL:-https://github.com/magento/magento2.git}
      MAGENTO_GIT_REF: ${MAGENTO_GIT_REF:-2.4-develop}
      MAGENTO_ADMIN_FIRSTNAME: ${MAGENTO_ADMIN_FIRSTNAME:-Admin}
      MAGENTO_ADMIN_LASTNAME: ${MAGENTO_ADMIN_LASTNAME:-User}
      MAGENTO_ADMIN_EMAIL: ${MAGENTO_ADMIN_EMAIL:-admin@example.com}
      MAGENTO_BACKEND_FRONTNAME: ${MAGENTO_BACKEND_FRONTNAME:-admin}
    depends_on:
      magento-db:
        condition: service_healthy
      magento-search:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s
    volumes:
      - ../../../magento-src:/var/www/html

volumes:
  odoo_web_data:
  magento_search_data:
