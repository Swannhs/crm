services:
  organization-service:
    build:
      context: ../../..
      dockerfile: services/organization-service/docker/Dockerfile.prod
      args:
        SERVICE_NAME: organization-service
        SERVICE_PORT: 7010
    environment:
      NODE_ENV: production
      PORT: ${ORGANIZATION_SERVICE_PORT:-7010}
      DATABASE_URL: postgres://organization:organization@organization-db:5432/organization
      KAFKA_BROKERS: kafka:9092
      KEYCLOAK_ADMIN_URL: http://keycloak:8080
      KEYCLOAK_REALM: mymanager
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    depends_on:
      organization-db:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  booking-service:
    build:
      context: ../../..
      dockerfile: services/booking-service/docker/Dockerfile.prod
      args:
        SERVICE_NAME: booking-service
        SERVICE_PORT: 7040
    environment:
      NODE_ENV: production
      PORT: ${BOOKING_SERVICE_PORT:-7040}
      DATABASE_URL: postgres://booking:booking@booking-db:5432/booking
      ODOO_SERVICE_URL: http://odoo-integration-service:7200
    depends_on:
      booking-db:
        condition: service_healthy
    restart: unless-stopped

  finance-service:
