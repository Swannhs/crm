      KEYCLOAK_TOKEN_URL: ${KEYCLOAK_TOKEN_URL}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      ODOO_INTEGRATION_BASE_URL: ${ODOO_INTEGRATION_BASE_URL}
      BOOKING_SERVICE_BASE_URL: ${BOOKING_SERVICE_BASE_URL}
      SCORING_SERVICE_BASE_URL: ${SCORING_SERVICE_BASE_URL}
