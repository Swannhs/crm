      ODOO_BASE_URL: ${ODOO_BASE_URL:-http://odoo:8069}
      ODOO_DB: ${ODOO_DB:-odoo}
      ODOO_USERNAME: ${ODOO_USERNAME:-admin}
      ODOO_PASSWORD: ${ODOO_PASSWORD:-admin}
      ODOO_API_KEY: ${ODOO_API_KEY:-}
      DATABASE_URL: postgres://odoo_integration:odoo_integration@odoo-integration-db:5432/odoo_integration
