# Application services (microservices only).
services:
  organization-service:
    container_name: ms-organization-service
    environment:
      PORT: 7010
      KAFKA_BROKERS: kafka:9092
      DB_URL: postgres://organization:organization@organization-db:5432/organization
    depends_on:
      kafka:
        condition: service_started
      organization-db:
        condition: service_healthy
    ports:
      - "7010:7010"

  booking-service:
    container_name: ms-booking-service
    environment:
      PORT: 7040
      KAFKA_BROKERS: kafka:9092
      DB_URL: postgres://booking:booking@booking-db:5432/booking
    depends_on:
      kafka:
        condition: service_started
      booking-db:
        condition: service_healthy
    ports:
      - "7040:7040"

  finance-service:
    container_name: ms-finance-service
    environment:
      PORT: 7170
      DB_URL: postgres://finance:finance@finance-db:5432/finance
    depends_on:
      finance-db:
        condition: service_healthy
    ports:
      - "7170:7170"

  api-router-service:
    container_name: ms-api-router-service
    environment:
      PORT: 7001
    ports:
      - "7001:7001"

  community-service:
    container_name: ms-community-service
