# Application services (microservices only).
services:
  organization-service:
    container_name: ms-organization-service
    environment:
      PORT: 7010
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://organization:organization@organization-db:5432/organization
      KEYCLOAK_ADMIN_URL: http://keycloak:8080
      KEYCLOAK_REALM: mymanager
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    depends_on:
      kafka:
        condition: service_started
      organization-db:
        condition: service_healthy
    ports:
      - "7010:7010"

  api-router-service:
    container_name: ms-api-router-service
    environment:
      PORT: 7001
    ports:
      - "7001:7001"

  realtime-service:
    container_name: ms-realtime-service
    environment:
      PORT: 7030
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://realtime:realtime@realtime-db:5432/realtime
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
      realtime-db:
        condition: service_healthy
    ports:
      - "7030:7030"

  integrations-service:
    container_name: ms-integrations-service
    environment:
      PORT: 7140
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://integrations:integrations@integrations-db:5432/integrations
      MAGENTO_INTEGRATION_SERVICE_URL: http://magento-integration-service:7190
      ODOO_INTEGRATION_SERVICE_URL: http://odoo-integration-service:7200
    depends_on:
      kafka:
        condition: service_started
      integrations-db:
        condition: service_healthy
      magento-integration-service:
        condition: service_started
      odoo-integration-service:
        condition: service_started
    ports:
      - "7140:7140"

  magento-integration-service:
    container_name: ms-magento-integration-service
    environment:
      PORT: 7190
      # Magento itself runs in a separate docker project/stack.
      # Set this to a reachable Magento base URL, e.g. http://host.docker.internal:8088
      MAGENTO_BASE_URL: ${MAGENTO_BASE_URL:-}
      MAGENTO_ACCESS_TOKEN: ${MAGENTO_ACCESS_TOKEN:-}
      MAGENTO_STORE_CODE: ${MAGENTO_STORE_CODE:-default}
      DATABASE_URL: postgres://magento_integration:magento_integration@magento-integration-db:5432/magento_integration
    depends_on:
      magento-integration-db:
        condition: service_healthy
    ports:
      - "7190:7190"

  odoo-integration-service:
    container_name: ms-odoo-integration-service
    environment:
      PORT: 7200
      ODOO_BASE_URL: ${ODOO_BASE_URL:-http://odoo:8069}
      ODOO_DB: ${ODOO_DB:-}
      ODOO_USERNAME: ${ODOO_USERNAME:-}
      ODOO_PASSWORD: ${ODOO_PASSWORD:-}
      ODOO_API_KEY: ${ODOO_API_KEY:-}
      MAGENTO_API_BASE_URL: http://magento-integration-service:7190
      DATABASE_URL: postgres://odoo_integration:odoo_integration@odoo-integration-db:5432/odoo_integration
    depends_on:
      magento-integration-service:
        condition: service_started
      odoo-integration-db:
        condition: service_healthy
    ports:
      - "7200:7200"

  email-sync-service:
    container_name: ms-email-sync-service
    environment:
      PORT: 7160
      DATABASE_URL: postgres://emailsync:emailsync@email-sync-db:5432/email_sync_service
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: mymanager
      KEYCLOAK_CLIENT_ID: crm-api
    depends_on:
      email-sync-db:
        condition: service_healthy
    ports:
      - "7160:7160"
