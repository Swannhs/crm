# Optional local Magento Open Source runtime stack.
# Enable this file when starting the stack to run Magento (app + DB + search) alongside CRM services.
services:
  magento-db:
    image: mysql:8.4
    container_name: ms-magento-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MAGENTO_DB_ROOT_PASSWORD:-magento_root}
      MYSQL_DATABASE: ${MAGENTO_DB_NAME:-magento}
      MYSQL_USER: ${MAGENTO_DB_USER:-magento}
      MYSQL_PASSWORD: ${MAGENTO_DB_PASSWORD:-magento}
    ports:
      - "${MAGENTO_DB_PORT:-33306}:3306"
    volumes:
      - magento_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  magento-search:
    image: opensearchproject/opensearch:2.15.0
    container_name: ms-magento-search
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: -Xms${MAGENTO_ES_HEAP_MIN:-512m} -Xmx${MAGENTO_ES_HEAP_MAX:-512m}
      DISABLE_SECURITY_PLUGIN: "true"
    ports:
      - "${MAGENTO_ES_PORT:-9201}:9200"
    volumes:
      - magento_search_data:/usr/share/opensearch/data

  magento:
    build:
      context: ../..
      dockerfile: services/magento-service/docker/Dockerfile.dev
    container_name: ms-magento
    ports:
      - "${MAGENTO_HTTP_PORT:-8088}:80"
      - "${MAGENTO_HTTPS_PORT:-8448}:443"
    environment:
      APP_UID: ${MAGENTO_APP_UID:-1000}
      APP_GID: ${MAGENTO_APP_GID:-1000}
      MAGENTO_HOST: ${MAGENTO_HOST:-localhost}
      MAGENTO_BASE_URL: ${MAGENTO_BASE_URL_PUBLIC:-http://localhost:8088}
      MAGENTO_DB_HOST: magento-db
      MAGENTO_DB_PORT: 3306
      MAGENTO_DB_DATABASE: ${MAGENTO_DB_NAME:-magento}
      MAGENTO_DB_USERNAME: ${MAGENTO_DB_USER:-magento}
      MAGENTO_DB_PASSWORD: ${MAGENTO_DB_PASSWORD:-magento}
      MYSQL_HOST: magento-db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MAGENTO_DB_NAME:-magento}
      MYSQL_USER: ${MAGENTO_DB_USER:-magento}
      MYSQL_PASSWORD: ${MAGENTO_DB_PASSWORD:-magento}
      OPENSEARCH_HOST: magento-search
      OPENSEARCH_PORT: 9200
      ELASTICSEARCH_HOST: magento-search
      ELASTICSEARCH_PORT: 9200
    depends_on:
      magento-db:
        condition: service_healthy
      magento-search:
        condition: service_started
    volumes:
      # Run Magento from source code mounted from the host workspace.
      # Default host path resolves to <repo-root>/services/magento-service.
      - ${MAGENTO_SOURCE_DIR:-../../services/magento-service}:/var/www/html

  magento-integration-service:
    environment:
      # Internal URL used by the integration service when this addon is enabled.
      MAGENTO_BASE_URL: ${MAGENTO_BASE_URL:-http://magento}
      MAGENTO_STORE_CODE: ${MAGENTO_STORE_CODE:-default}
      # Use either MAGENTO_ACCESS_TOKEN directly, or admin credentials for automatic token resolution.
      MAGENTO_ACCESS_TOKEN: ${MAGENTO_ACCESS_TOKEN:-}
      MAGENTO_ADMIN_USERNAME: ${MAGENTO_ADMIN_USERNAME:-admin}
      MAGENTO_ADMIN_PASSWORD: ${MAGENTO_ADMIN_PASSWORD:-admin123}
    depends_on:
      magento:
        condition: service_started

volumes:
  magento_db_data:
  magento_search_data:
