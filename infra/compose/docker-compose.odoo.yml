# Optional local Odoo runtime stack.
# Enable this file when starting the stack to run Odoo (app + DB) alongside CRM services.
services:
  odoo-db:
    image: postgres:16-alpine
    container_name: ms-odoo-db
    environment:
      POSTGRES_DB: ${ODOO_DB:-odoo}
      POSTGRES_USER: ${ODOO_DB_USER:-odoo}
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
    ports:
      - "${ODOO_DB_PORT:-5436}:5432"
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 20

  odoo:
    image: odoo:18.0
    container_name: ms-odoo
    depends_on:
      odoo-db:
        condition: service_healthy
    environment:
      HOST: odoo-db
      PORT: 5432
      USER: ${ODOO_DB_USER:-odoo}
      PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
    ports:
      - "${ODOO_HTTP_PORT:-8069}:8069"
    volumes:
      - odoo_web_data:/var/lib/odoo

  odoo-integration-service:
    environment:
      ODOO_BASE_URL: ${ODOO_BASE_URL:-http://odoo:8069}
      ODOO_DB: ${ODOO_DB:-odoo}
      ODOO_USERNAME: ${ODOO_USERNAME:-admin}
      ODOO_PASSWORD: ${ODOO_PASSWORD:-admin}
    depends_on:
      odoo:
        condition: service_started

volumes:
  odoo_db_data:
  odoo_web_data:
