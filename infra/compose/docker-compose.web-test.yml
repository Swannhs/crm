services:
  keycloak:
    command: ["start", "--http-enabled=true", "--hostname-strict=false", "--import-realm"]
    restart: unless-stopped

  monolith:
    environment:
      NODE_ENV: production
    command: sh -c "yarn install --frozen-lockfile || yarn install && node index.js"
    restart: unless-stopped

  organization-service:
    environment:
      NODE_ENV: production
    command: sh -c "corepack yarn install --frozen-lockfile && corepack yarn exec prisma generate && corepack yarn exec prisma db push --skip-generate && corepack yarn build && corepack yarn start"
    restart: unless-stopped

