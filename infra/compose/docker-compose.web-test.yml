services:
  keycloak:
    command: ["start", "--http-enabled=true", "--hostname-strict=false", "--import-realm"]
    restart: unless-stopped

  monolith:
    restart: unless-stopped

  organization-service:
    restart: unless-stopped

  booking-service:
    restart: unless-stopped

  api-router-service:
    restart: unless-stopped

  community-service:
    restart: unless-stopped

  commerce-service:
    restart: unless-stopped

  documents-service:
    restart: unless-stopped

  payments-service:
    restart: unless-stopped

  notification-service:
    restart: unless-stopped

  employees-service:
    restart: unless-stopped

  realtime-service:
    restart: unless-stopped

  marketing-service:
    restart: unless-stopped

  projects-service:
    restart: unless-stopped

  calendar-service:
    restart: unless-stopped

  pos-service:
    restart: unless-stopped

  automation-service:
    restart: unless-stopped

  device-service:
    restart: unless-stopped

  file-service:
    restart: unless-stopped

  integrations-service:
    restart: unless-stopped

  magento-integration-service:
    restart: unless-stopped

  odoo-integration-service:
    restart: unless-stopped

  frontend:
    build:
      context: ../../frontend/micro-app
      dockerfile: docker/Dockerfile.prod
    volumes: []
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_ENV: web-test
      NEXT_PUBLIC_API_URL: http://localhost:8081/api
      WATCHPACK_POLLING: "false"
    restart: unless-stopped

  seed-dummy-data:
    image: node:24-alpine
    container_name: ms-seed-dummy-data
    working_dir: /repo
    volumes:
      - ../../:/repo
    environment:
      SEED_PROJECTS_HOST: projects-service
      SEED_PROJECTS_PORT: 8040
      SEED_ORG_ID: d6b9ea2a-7e1e-4b9a-9e1e-5a0a38d7b384
      SEED_USER_ID: 85c982a3-5a2e-4fca-bdf9-0373083edf60
      SEED_DELAY_SECONDS: 30
    command: sh -c "sleep ${SEED_DELAY_SECONDS:-30} && node scripts/seed.cjs"
    depends_on:
      - projects-service
      - frontend
    restart: "no"
