name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  frontend-build:
    name: Frontend Build (micro-app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build frontend (includes TS checks)
        run: yarn workspace micro-app build

  backend-build:
    name: Backend Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - "@mymanager/api-router-service"
          - "odoo-integration-service"
          - "@mymanager/email-sync-service"
          - "@mymanager/organization-service"
          - "booking-service"
          - "@mymanager/integrations-service"
          - "@mymanager/realtime-service"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build workspace service
        run: yarn workspace "${{ matrix.service }}" build

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Odoo integration unit tests
        run: yarn workspace odoo-integration-service test --runInBand
      - name: API router type safety
        run: yarn workspace @mymanager/api-router-service typecheck
      - name: Email sync tests
        run: yarn workspace @mymanager/email-sync-service test

  prisma-checks:
    name: Prisma Generate + Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Generate Prisma clients for schema services
        run: |
          set -euo pipefail
          for svc in \
            services/booking-service \
            services/email-sync-service \
            services/integrations-service \
            services/odoo-integration-service \
            services/organization-service \
            services/realtime-service
          do
            if [ -f "$svc/prisma/schema.prisma" ]; then
              echo "Generating Prisma for $svc"
              (cd "$svc" && npx prisma generate)
            fi
          done
      - name: Validate Prisma schemas
        run: |
          set -euo pipefail
          for schema in $(find services -path "*/prisma/schema.prisma" | sort); do
            echo "Validating $schema"
            npx prisma validate --schema="$schema"
          done

  docker-smoke-check:
    name: Docker Smoke Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build key service images
        run: |
          set -euo pipefail
          docker build -f services/api-router-service/docker/Dockerfile.dev -t crm/api-router:ci .
          docker build -f services/odoo-integration-service/docker/Dockerfile.dev -t crm/odoo-integration:ci .
          docker build -f services/email-sync-service/docker/Dockerfile.dev -t crm/email-sync:ci .
          docker build -f services/organization-service/docker/Dockerfile.dev -t crm/organization:ci .
          docker build -f services/booking-service/docker/Dockerfile.dev -t crm/booking:ci .

  runtime-safety-checks:
    name: Runtime Safety Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Check hardcoded runtime assumptions
        run: yarn check:no-hardcoded-runtime
