server {
    listen 8081;
    server_name localhost;
    client_max_body_size 50m;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Helper to pass headers
    # TODO: In production, do not trust public user-supplied X-User-Id/X-Org-Id.
    # A verified auth layer must set trusted identity headers before proxying.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Org-Id $http_x_org_id;
    proxy_set_header X-User-Id $http_x_user_id;

    # Avoid duplicate CORS headers from upstreams
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;

    # Organization & Memberships
    location ~ ^/(api/organization/|org/|api/org/)(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_org organization-service;
        proxy_pass http://$upstream_org:7010/$2$is_args$args;
    }

    # Odoo-managed Business Logic (Compatibility Layer)
    # Rerouting legacy microservice paths to the corresponding Odoo modules.
    
    # Deals -> Odoo CRM
    location ~ ^/api/v1/deals(/.*)?$ {
        include /etc/nginx/cors.conf;
        set $upstream_odoo odoo-integration-service;
        proxy_pass http://$upstream_odoo:7200/v1/odoo/crm$1$is_args$args;
    }
    
    # Projects
    location ~ ^/api/projects(/.*)?$ {
        include /etc/nginx/cors.conf;
        set $upstream_odoo odoo-integration-service;
        proxy_pass http://$upstream_odoo:7200/v1/odoo/projects$1$is_args$args;
    }

    # Employees -> Odoo HR Employees
    location ~ ^/api/employees(/.*)?$ {
        include /etc/nginx/cors.conf;
        set $upstream_odoo odoo-integration-service;
        proxy_pass http://$upstream_odoo:7200/v1/odoo/employees$1$is_args$args;
    }

    # Posts -> Odoo Blog
    location ~ ^/api/post(/.*)?$ {
        include /etc/nginx/cors.conf;
        set $upstream_odoo odoo-integration-service;
        proxy_pass http://$upstream_odoo:7200/v1/odoo/posts$1$is_args$args;
    }

    # Inventory
    location ~ ^/api/inventory(/.*)?$ {
        include /etc/nginx/cors.conf;
        set $upstream_odoo odoo-integration-service;
        proxy_pass http://$upstream_odoo:7200/v1/odoo/inventory$1$is_args$args;
    }

    # Generic Odoo Catch-all for remaining business logic
    location ~ ^/api/(documents|pos|marketing|automation|v1/scoring)(/.*)?$ {
        include /etc/nginx/cors.conf;
        set $upstream_odoo odoo-integration-service;
        proxy_pass http://$upstream_odoo:7200/v1/odoo/$1$2$is_args$args;
    }

    # Odoo Base Integration (Catch-all)
    location ~ ^/api/odoo/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_odoo_integration odoo-integration-service;
        proxy_pass http://$upstream_odoo_integration:7200/v1/odoo/$1$is_args$args;
    }

    # Notification & Realtime (Hybrid)
    location ~ ^/api/notifications?(/.*)?$ {
        include /etc/nginx/cors.conf;
        set $upstream_rt realtime-service;
        proxy_pass http://$upstream_rt:7030/v1/notifications$1$is_args$args;
    }
    location ~ ^/api/livechat/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_rt realtime-service;
        proxy_pass http://$upstream_rt:7030/v1/livechat/$1$is_args$args;
    }
    location ~ ^/api/realtime/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_rt realtime-service;
        proxy_pass http://$upstream_rt:7030/v1/$1$is_args$args;
    }

    # Email Sync (Custom Sync Engine)
    location ~ ^/api/v1/email(/.*)?$ {
        include /etc/nginx/cors.conf;
        set $upstream_email email-sync-service;
        proxy_pass http://$upstream_email:7160/api/v1/email$1$is_args$args;
    }

    # Odoo Base Integration
    location ~ ^/api/odoo/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_odoo_integration odoo-integration-service;
        proxy_pass http://$upstream_odoo_integration:7200/v1/odoo/$1$is_args$args;
    }
    location = /api/odoo {
        include /etc/nginx/cors.conf;
        set $upstream_odoo_integration odoo-integration-service;
        proxy_pass http://$upstream_odoo_integration:7200/v1/odoo;
    }

    # Image Library (product media assets)
    location = /api/image-library {
        include /etc/nginx/cors.conf;
        set $upstream_integrations integrations-service;
        proxy_pass http://$upstream_integrations:7140/v1/image-library$is_args$args;
    }

    location ~ ^/api/image-library/([^/]+)$ {
        include /etc/nginx/cors.conf;
        set $upstream_integrations integrations-service;
        proxy_pass http://$upstream_integrations:7140/v1/image-library/$1$is_args$args;
    }

    # Compatibility fallback to API Router
    location /api/ {
        include /etc/nginx/cors.conf;
        set $upstream_router api-router-service;
        proxy_pass http://$upstream_router:7001;
    }

    # Health check
    location /health {
        return 200 '{"status":"ok","gateway":"nginx-mega"}';
        add_header Content-Type application/json;
    }

    # Catch-all
    location / {
        return 404 '{"error":"Not Found","path":"$request_uri","gateway":"nginx-mega"}';
        add_header Content-Type application/json;
    }
}
