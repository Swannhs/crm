server {
    listen 8081;
    server_name localhost;
    client_max_body_size 50m;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Helper to pass headers
    # TODO: In production, do not trust public user-supplied X-User-Id/X-Org-Id.
    # A verified auth layer must set trusted identity headers before proxying.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Org-Id $http_x_org_id;
    proxy_set_header X-User-Id $http_x_user_id;

    # Avoid duplicate CORS headers from upstreams
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;

    # Organization & Memberships
    location ~ ^/(api/organization/|org/|api/org/)(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_org organization-service;
        proxy_pass http://$upstream_org:7010/$2$is_args$args;
    }

    # CRM
    location ~ ^/(api/crm/|crm/)(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_crm crm-service;
        proxy_pass http://$upstream_crm:8010/api/$2$is_args$args;
    }

    # Projects
    location ~ ^/api/projects/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_projects projects-service;
        proxy_pass http://$upstream_projects:8040/$1$is_args$args;
    }

    # Billing & Invoice
    location ~ ^/api/billing/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_billing billing-service;
        proxy_pass http://$upstream_billing:7020/$1$is_args$args;
    }
    location ~ ^/api/invoice/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_billing billing-service;
        proxy_pass http://$upstream_billing:7020/v1/invoices/$1$is_args$args;
    }
    location = /api/invoice {
        include /etc/nginx/cors.conf;
        set $upstream_billing billing-service;
        proxy_pass http://$upstream_billing:7020/v1/invoices;
    }
    location ~ ^/api/business/(income-report|tax-report|income-statistics)$ {
        include /etc/nginx/cors.conf;
        set $upstream_billing billing-service;
        proxy_pass http://$upstream_billing:7020/v1/invoices/finance-statistics$is_args$args;
    }

    # Documents
    location ~ ^/api/documents/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_docs documents-service;
        proxy_pass http://$upstream_docs:7080/v1/documents/$1$is_args$args;
    }
    location ~ ^/api/document/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_docs documents-service;
        proxy_pass http://$upstream_docs:7080/v1/documents/$1$is_args$args;
    }
    location = /api/documents {
        include /etc/nginx/cors.conf;
        set $upstream_docs documents-service;
        proxy_pass http://$upstream_docs:7080/v1/documents;
    }

    # Employees
    location ~ ^/api/employees/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_emp employees-service;
        proxy_pass http://$upstream_emp:7070/v1/employees/$1$is_args$args;
    }
    location ~ ^/api/employee/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_emp employees-service;
        proxy_pass http://$upstream_emp:7070/v1/employees/$1$is_args$args;
    }

    # POS
    location ~ ^/api/pos/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_pos pos-service;
        proxy_pass http://$upstream_pos:7100/v1/$1$is_args$args;
    }

    # Calendar
    location ~ ^/api/calendar/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_cal calendar-service;
        proxy_pass http://$upstream_cal:8050/$1$is_args$args;
    }

    # Notification
    location ~ ^/api/notifications?/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_notif notification-service;
        proxy_pass http://$upstream_notif:8000/v1/notifications/$1$is_args$args;
    }

    # Marketing
    location ~ ^/api/marketing/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_mkt marketing-service;
        proxy_pass http://$upstream_mkt:8030/v1/$1$is_args$args;
    }

    # Automation
    location ~ ^/api/automation/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_auto automation-service;
        proxy_pass http://$upstream_auto:7110/$1$is_args$args;
    }

    # Realtime / Livechat
    location ~ ^/api/livechat/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_rt realtime-service;
        proxy_pass http://$upstream_rt:7030/v1/livechat/$1$is_args$args;
    }
    location ~ ^/api/realtime/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_rt realtime-service;
        proxy_pass http://$upstream_rt:7030/v1/$1$is_args$args;
    }

    # Deprecated shop alias (legacy frontend compatibility).
    # Canonical route is /api/magento/*.
    # Public storefront commerce should use Magento storefront/GraphQL APIs directly.
    location ~ ^/api/shop/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_magento_integration magento-integration-service;
        proxy_pass http://$upstream_magento_integration:7190/v1/magento/$1$is_args$args;
    }

    # Deals
    location ~ ^/api/v1/deals/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_deal deal-service;
        proxy_pass http://$upstream_deal:7150/api/v1/deals/$1$is_args$args;
    }

    # Email Sync
    location ~ ^/api/v1/email/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_email email-sync-service;
        proxy_pass http://$upstream_email:7160/api/v1/email/$1$is_args$args;
    }

    # Scoring
    location ~ ^/api/v1/scoring/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_score scoring-service;
        proxy_pass http://$upstream_score:7180/api/v1/scoring/$1$is_args$args;
    }

    # Magento Integration (Magento runtime stays external to this stack)
    location ~ ^/api/magento/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_magento_integration magento-integration-service;
        proxy_pass http://$upstream_magento_integration:7190/v1/magento/$1$is_args$args;
    }
    location = /api/magento {
        include /etc/nginx/cors.conf;
        set $upstream_magento_integration magento-integration-service;
        proxy_pass http://$upstream_magento_integration:7190/v1/magento;
    }
    # Deprecated alias for old integrations endpoint naming.
    # Canonical route is /api/magento/*.
    location ~ ^/api/integrations/magento/(.*)$ {
        include /etc/nginx/cors.conf;
        set $upstream_magento_integration magento-integration-service;
        proxy_pass http://$upstream_magento_integration:7190/v1/magento/$1$is_args$args;
    }
    location = /api/integrations/magento {
        include /etc/nginx/cors.conf;
        set $upstream_magento_integration magento-integration-service;
        proxy_pass http://$upstream_magento_integration:7190/v1/magento/connection;
    }

    # Compatibility fallback to API Router
    location /api/ {
        include /etc/nginx/cors.conf;
        set $upstream_router api-router-service;
        proxy_pass http://$upstream_router:7001/api/;
    }

    # Health check
    location /health {
        return 200 '{"status":"ok","gateway":"nginx-mega"}';
        add_header Content-Type application/json;
    }

    # Catch-all
    location / {
        return 404 '{"error":"Not Found","path":"$request_uri","gateway":"nginx-mega"}';
        add_header Content-Type application/json;
    }
}
