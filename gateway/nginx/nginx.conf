server {
    listen 8081;
    server_name localhost;

    # Helper to pass headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Org-Id $http_x_org_id;
    proxy_set_header X-User-Id $http_x_user_id;

    # CRM & Contacts
    location /api/crm/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://crm-service:8010/api/;
    }
    location /crm/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://crm-service:8010/api/;
    }

    # Legacy contact compatibility
    location = /api/contact/get {
        proxy_pass http://crm-service:8010/api/v1/contacts;
    }
    location = /api/contact/add {
        proxy_pass http://crm-service:8010/api/v1/contacts;
    }
    location /api/contact/ {
        include /etc/nginx/cors.conf;
        rewrite ^/api/contact/(.*)$ /api/v1/contacts/$1 break;
        proxy_pass http://crm-service:8010;
    }

    # Automation
    location /api/automation/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://automation-service:7110/;
    }

    # Notification
    location /api/notification/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://notification-service:8000/v1/notifications/;
    }
    location /api/notifications {
        include /etc/nginx/cors.conf;
        proxy_pass http://notification-service:8000/v1/notifications;
    }

    # Marketing
    location /api/marketing/v1/ {
        proxy_pass http://marketing-service:8030/v1/;
    }
    location /api/marketing/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://marketing-service:8030/v1/;
    }

    # Calendar
    location /api/calendar/v1/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://calendar-service:8050/v1/;
    }
    location /api/calendar/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://calendar-service:8050/v1/;
    }

    # Projects
    location /api/projects/v1/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://projects-service:8040/v1/;
    }
    location /api/projects/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://projects-service:8040/v1/;
    }

    # Community
    location /api/community/v1/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://community-service:7050/v1/;
    }
    location /api/community/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://community-service:7050/v1/;
    }

    # Billing & Invoice
    location /api/invoice/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://api-router-service:7001/api/invoice/;
    }
    location /api/invoice {
        include /etc/nginx/cors.conf;
        proxy_pass http://api-router-service:7001/api/invoice;
    }

    # Booking
    location /api/booking/v1/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://booking-service:7040/v1/;
    }
    location /api/booking/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://booking-service:7040/v1/;
    }

    # Organization
    location /api/organization/v1/details {
        include /etc/nginx/cors.conf;
        proxy_pass http://organization-service:7010/v1/organizations;
    }
    location /api/organization/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://organization-service:7010/;
    }
    location /org/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://organization-service:7010/;
    }
    location /api/org/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://organization-service:7010/;
    }

    # Integrations
    location /api/integrations/v1/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://integrations-service:7140/v1/;
    }
    location /api/integrations/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://integrations-service:7140/v1/;
    }

    # Realtime / Livechat compatibility
    location /api/livechat/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://realtime-service:7030/v1/livechat/;
    }
    location /api/realtime/v1/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://realtime-service:7030/v1/;
    }

    # Shop / Commerce
    location /api/shop/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://commerce-service:7060/v1/;
    }

    # Public Webhooks
    location /api/public/ {
        proxy_pass http://automation-service:7110/v1/public/;
    }

    # Legacy API fallback for routes still served through api-router-service.
    # Specific /api/* locations above take precedence due longer match length.
    location /api/ {
        include /etc/nginx/cors.conf;
        proxy_pass http://api-router-service:7001/api/;
    }

    # Default Health check
    location /health {
        return 200 '{"status":"ok","gateway":"nginx-mega"}';
        add_header Content-Type application/json;
    }

    # Catch-all for debugging
    location / {
        return 404 '{"error":"Not Found","path":"$request_uri","gateway":"nginx-mega"}';
        add_header Content-Type application/json;
    }
}
